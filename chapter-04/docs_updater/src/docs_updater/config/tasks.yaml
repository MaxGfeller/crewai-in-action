update_docs:
  description: >
    Update the user-facing documentation in our Mintlify documentation site so that it reflects the latest changes in the codebase.

    Here are some details about the latest changes in the application:
    {latest_changes}

    IMPORTANT - When updating documentation files, follow these rules:
    1. ONLY modify the specific sections that relate to the changes described above
    2. DO NOT rewrite or regenerate content that is unrelated to the changes
    3. Preserve all existing content, formatting, and structure that doesn't need to change
    4. Read the entire file first, then make minimal, targeted edits
    5. When using the file writer tool, include ALL original content that should be kept

    When writing, please orient yourself on the existing documentation and try to follow the same structure and style. Use simple words, write clearly, and don't use any jargon - if you do, make sure to explain the term in the text.

    Use the provided file tools to explore and update the documentation:
    - Use list_docs_directory to see available files and folders (e.g., list_docs_directory('.') for root)
    - Use read_docs_file to read file contents (e.g., read_docs_file('introduction.mdx'))
    - Use write_docs_file to update files (e.g., write_docs_file('getting-started.mdx', content))
    All paths should be relative (e.g., 'introduction.mdx', 'images/dashboard.png')

    SCREENSHOTS: After updating the documentation, if any screenshots need to be updated based on the changes,
    you MUST use the "Delegate work to coworker" tool to delegate the screenshot task to the coworker named
    "Application screenshot specialist". Do NOT just say you delegated - you MUST actually call the delegation tool.

    When delegating a screenshot task, provide these details in the task description:
    - Which page/view needs to be captured (e.g., "the dashboard page after login")
    - The filename to save (e.g., "dashboard.png")

    Example task to delegate: "Take a screenshot of the dashboard page after login and save it as dashboard.png"

    IMPORTANT: After delegation completes, the coworker will report back the FULL ABSOLUTE PATH to the saved screenshot
    (something like /var/folders/.../dashboard.png). You MUST immediately use the "copy_to_docs" tool to copy
    the screenshot from that path to the correct location in the docs folder.

    You MUST call copy_to_docs with:
    - source_path: the absolute path from the coworker's response (e.g., "/var/folders/.../dashboard.png")
    - destination_path: relative path in docs (e.g., "images/dashboard.png")

    DO NOT finish the task without calling copy_to_docs after each screenshot delegation.

  expected_output: >
    1. A summary of documentation changes made
    2. For each screenshot needed: confirmation that the screenshot was captured and copied to the docs folder
  agent: docs_updater
